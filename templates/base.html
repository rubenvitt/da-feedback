{{define "base"}}<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    (function(){
        var s = localStorage.getItem('theme');
        if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    })();
    </script>
    <title>{{template "title" .}} — DA-Feedback</title>
    <link rel="stylesheet" href="/static/style.css">
    {{with sentryLoader}}
    <script src="{{.}}" crossorigin="anonymous"></script>
    <script>
      if (window.Sentry && typeof Sentry.onLoad === "function") {
        Sentry.onLoad(function () {
          Sentry.init({
            tracesSampleRate: 1.0,
            replaysSessionSampleRate: 0.1,
            replaysOnErrorSampleRate: 1.0,
          });
        });
      }
    </script>
    {{end}}
    {{block "head" .}}{{end}}
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
    {{block "nav" .}}{{end}}
    <main class="max-w-4xl mx-auto px-4 py-8">
        {{template "content" .}}
    </main>

    <!-- Theme Toggle -->
    <button id="theme-toggle" onclick="cycleTheme()" aria-label="Farbschema wechseln"
        class="fixed bottom-4 right-4 z-50 p-2.5 rounded-full bg-white dark:bg-gray-800 shadow-lg border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 transition-colors cursor-pointer">
        <!-- Sun (visible in dark mode) -->
        <svg id="theme-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <!-- Moon (visible in light mode) -->
        <svg id="theme-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <!-- Monitor (visible in system mode) -->
        <svg id="theme-system" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    </button>

    <script>
    (function(){
        function getMode() {
            return localStorage.getItem('theme') || 'system';
        }
        function applyMode(mode) {
            if (mode === 'system') {
                localStorage.removeItem('theme');
                document.documentElement.classList.toggle('dark', window.matchMedia('(prefers-color-scheme: dark)').matches);
            } else {
                localStorage.setItem('theme', mode);
                document.documentElement.classList.toggle('dark', mode === 'dark');
            }
            updateIcon();
            if (typeof window.updateChartTheme === 'function') window.updateChartTheme();
        }
        function updateIcon() {
            var mode = getMode();
            document.getElementById('theme-sun').classList.toggle('hidden', mode !== 'dark');
            document.getElementById('theme-moon').classList.toggle('hidden', mode !== 'light');
            document.getElementById('theme-system').classList.toggle('hidden', mode !== 'system');
        }
        window.cycleTheme = function() {
            var order = ['light','dark','system'];
            var cur = getMode();
            var next = order[(order.indexOf(cur) + 1) % order.length];
            applyMode(next);
        };
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem('theme')) {
                document.documentElement.classList.toggle('dark', e.matches);
                updateIcon();
                if (typeof window.updateChartTheme === 'function') window.updateChartTheme();
            }
        });
        updateIcon();
    })();

    function getChartColors() {
        var isDark = document.documentElement.classList.contains('dark');
        return {
            isDark: isDark,
            textColor: isDark ? '#d1d5db' : '#374151',
            bgColor: isDark ? '#1f2937' : '#ffffff',
            axisLineColor: isDark ? '#4b5563' : '#e5e7eb',
            splitLineColor: isDark ? '#374151' : '#f3f4f6',
            cardBg: isDark ? '#1f2937' : '#ffffff',
            tooltipBg: isDark ? '#374151' : '#fff',
            tooltipBorder: isDark ? '#4b5563' : '#e5e7eb',
            tooltipText: isDark ? '#f3f4f6' : '#374151',
            areaColor: isDark ? 'rgba(220,38,38,0.15)' : 'rgba(185,28,28,0.08)',
            lineColor: '#b91c1c',
            splitAreaColors: isDark
                ? ['rgba(220,38,38,0.04)','rgba(220,38,38,0.06)','rgba(220,38,38,0.08)','rgba(220,38,38,0.10)','rgba(220,38,38,0.12)']
                : ['rgba(220,38,38,0.02)','rgba(220,38,38,0.04)','rgba(220,38,38,0.06)','rgba(220,38,38,0.08)','rgba(220,38,38,0.1)']
        };
    }
    </script>
    {{block "scripts" .}}{{end}}
</body>
</html>{{end}}
